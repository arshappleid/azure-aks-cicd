<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>React App</title>
    <!--
      env-config.js is generated at container startup by docker-entrypoint.sh.
      It exposes window._env_ so the app can read runtime environment variables
      (e.g. API_URL) without requiring a rebuild.
    -->
    <script src="%PUBLIC_URL%/env-config.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
