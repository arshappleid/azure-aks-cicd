meta:
  name: GET /health returns 200 and healthy status
  type: http
  seq: 1
http:
  method: GET
  url: "{{BASE_URL}}/health"
  body:
    type: none
runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.status
      operator: eq
      value: "healthy"